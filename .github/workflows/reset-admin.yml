name: Reset Password Superadmin

# Jalankan MANUAL dari tab Actions (Run workflow).
# Isi "new_password" untuk menentukan password baru superadmin.
# Username superadmin akan diset ke 'admin'.
on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'Password baru superadmin'
        required: true
        default: 'ruangprint2026'

jobs:
  reset:
    runs-on: ubuntu-latest
    env:
      NEWPASS: ${{ github.event.inputs.new_password }}
    steps:
      - name: Reset superadmin via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs:     NEWPASS
          script: |
            set -e
            cd /opt/ruangprint-api
            sudo -u www-data DB_PATH=/var/lib/ruangprint/ruangprint.db NEWPASS="$NEWPASS" node -e '
              const b=require("bcryptjs");
              const D=require("better-sqlite3");
              const db=new D(process.env.DB_PATH);
              const hash=b.hashSync(process.env.NEWPASS,10);
              const r=db.prepare("UPDATE users SET password_hash=?, username=COALESCE(NULLIF(username,\"\"),\"admin\") WHERE role=\"superadmin\"").run(hash);
              if(r.changes===0){
                db.prepare("INSERT INTO users (email,username,password_hash,name,cabang,role) VALUES (?,?,?,?,?,?)")
                  .run("admin@ruangprint.co.id","admin",hash,"Super Admin","HO","superadmin");
                console.log("Superadmin dibuat baru.");
              } else {
                console.log("Superadmin diupdate:", r.changes);
              }
            '
            echo "=================================================="
            echo "  PASSWORD SUPERADMIN BERHASIL DIRESET"
            echo "  Username : admin"
            echo "  Login di /admin.html"
            echo "=================================================="
