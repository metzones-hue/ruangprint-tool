name: Deploy ke VPS

on:
  push:
    branches:
      - main

env:
  DOMAIN:  tool.ruangprint.co.id
  DOCROOT: /var/www/tool.ruangprint.co.id
  API_DIR: /opt/ruangprint-api
  DB_DIR:  /var/lib/ruangprint

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Upload HTML ke VPS ──────────────────────────────────
      - name: Upload file HTML ke VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "*.html"
          target:   /tmp/ruangprint-deploy
          rm:       true

      # ── Upload API backend ──────────────────────────────────
      - name: Upload API backend ke VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "api/"
          target:   /tmp/ruangprint-deploy
          rm:       false

      # ── SSH: setup Nginx + deploy HTML + deploy API ─────────
      - name: Setup Nginx, API, dan deploy semua file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs:     DOMAIN,DOCROOT,API_DIR,DB_DIR
          script: |
            set -e
            DOMAIN=tool.ruangprint.co.id
            DOCROOT=/var/www/tool.ruangprint.co.id
            API_DIR=/opt/ruangprint-api
            DB_DIR=/var/lib/ruangprint

            # ── 1. Nginx ────────────────────────────────────────────
            if ! command -v nginx >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nginx
            fi

            # ── 2. Deploy HTML ───────────────────────────────────────
            sudo mkdir -p "$DOCROOT"
            sudo cp -f /tmp/ruangprint-deploy/*.html "$DOCROOT"/
            sudo chown -R www-data:www-data "$DOCROOT"
            sudo find "$DOCROOT" -type f -exec chmod 644 {} \;
            sudo chmod 755 "$DOCROOT"

            # ── 3. Deploy API ────────────────────────────────────────
            sudo mkdir -p "$API_DIR" "$DB_DIR"
            sudo cp -f /tmp/ruangprint-deploy/api/server.js     "$API_DIR"/
            sudo cp -f /tmp/ruangprint-deploy/api/setup-user.js "$API_DIR"/
            sudo cp -f /tmp/ruangprint-deploy/api/package.json  "$API_DIR"/

            rm -rf /tmp/ruangprint-deploy

            # Install Node.js 20 jika belum ada
            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # Build tools (fallback kalau better-sqlite3 perlu kompilasi)
            if ! command -v make >/dev/null 2>&1; then
              sudo apt-get install -y build-essential python3
            fi

            echo "Node: $(node -v) | npm: $(npm -v)"

            # npm install (bersih, supaya native module sesuai Node yg terpasang)
            cd "$API_DIR"
            sudo rm -rf node_modules
            sudo npm install --production --no-audit --no-fund

            # Buat .env jika belum ada (JWT_SECRET hanya di-generate sekali)
            if [ ! -f "$API_DIR/.env" ]; then
              sudo bash -c "cat > $API_DIR/.env" <<ENV
            JWT_SECRET=$(openssl rand -hex 32)
            DB_PATH=$DB_DIR/ruangprint.db
            PORT=3001
            ENV
              echo "✓ .env dibuat dengan JWT_SECRET baru"
            fi

            # Kredensial superadmin awal — di-generate acak sekali, dicetak di log ini
            if ! grep -q BOOTSTRAP_ADMIN_PASSWORD "$API_DIR/.env"; then
              ADMINPW=$(openssl rand -hex 8)
              echo "BOOTSTRAP_ADMIN_EMAIL=admin@ruangprint.co.id" | sudo tee -a "$API_DIR/.env" >/dev/null
              echo "BOOTSTRAP_ADMIN_PASSWORD=$ADMINPW"           | sudo tee -a "$API_DIR/.env" >/dev/null
              echo "=================================================="
              echo "  SUPERADMIN AWAL DIBUAT:"
              echo "  Email    : admin@ruangprint.co.id"
              echo "  Password : $ADMINPW"
              echo "  >> Login di /admin.html lalu segera ganti password"
              echo "=================================================="
            fi

            sudo chown -R www-data:www-data "$API_DIR" "$DB_DIR"

            # ── 4. Systemd service ───────────────────────────────────
            sudo tee /etc/systemd/system/ruangprint-api.service > /dev/null <<SERVICE
            [Unit]
            Description=RuangPrint Quotation API
            After=network.target

            [Service]
            Type=simple
            User=www-data
            WorkingDirectory=$API_DIR
            EnvironmentFile=$API_DIR/.env
            ExecStart=/usr/bin/node $API_DIR/server.js
            Restart=on-failure
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICE

            sudo systemctl daemon-reload
            sudo systemctl enable ruangprint-api

            # Pastikan fuser tersedia (paket psmisc)
            command -v fuser >/dev/null 2>&1 || sudo apt-get install -y psmisc

            # Stop service & bebaskan port 3001 (fuser membunuh BERDASARKAN PORT,
            # jadi tidak akan mengenai skrip deploy ini sendiri)
            sudo systemctl stop ruangprint-api || true
            for i in 1 2 3; do
              sudo fuser -k 3001/tcp 2>/dev/null || true
              sleep 1
            done

            sudo systemctl start ruangprint-api

            # Verifikasi dengan retry (toleransi start agak lambat)
            OK=""
            for i in $(seq 1 10); do
              if [ "$(sudo systemctl is-active ruangprint-api)" = "active" ]; then OK=1; break; fi
              sleep 1
            done
            if [ -n "$OK" ]; then
              echo "✓ API berjalan"
            else
              echo "✗ API gagal start — log 30 baris terakhir:"
              sudo journalctl -u ruangprint-api -n 30 --no-pager || true
            fi

            # Tes endpoint API lokal
            echo "Tes /api lokal:"
            curl -s -o /dev/null -w "  HTTP %{http_code}\n" http://127.0.0.1:3001/api/auth/me || true

            # ── 5. Nginx vhost (dengan /api/ proxy) ──────────────────
            CONF=/etc/nginx/sites-available/$DOMAIN
            sudo tee "$CONF" > /dev/null <<NGINX
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name $DOMAIN;

                root $DOCROOT;
                index index.html;

                location /api/ {
                    proxy_pass         http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header   Host              \$host;
                    proxy_set_header   X-Real-IP         \$remote_addr;
                    proxy_set_header   X-Forwarded-For   \$proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto \$scheme;
                }

                location / {
                    try_files \$uri \$uri/ =404;
                }
            }
            NGINX

            sudo ln -sf "$CONF" /etc/nginx/sites-enabled/$DOMAIN
            sudo rm -f /etc/nginx/sites-enabled/default

            # Re-apply SSL jika sertifikat sudah ada
            if sudo test -d "/etc/letsencrypt/live/$DOMAIN"; then
              sudo certbot --nginx -d "$DOMAIN" \
                --non-interactive --agree-tos -m metzones@gmail.com \
                --keep-until-expiring 2>/dev/null && echo "✓ SSL re-applied" || true
            fi

            sudo nginx -t
            sudo systemctl reload nginx

            echo "=== Deploy selesai ==="
            echo "HTML  : $DOCROOT"
            echo "API   : $API_DIR"
            echo "DB    : $DB_DIR/ruangprint.db"
            ls -la "$DOCROOT"
