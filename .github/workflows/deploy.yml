name: Deploy ke VPS

on:
  push:
    branches:
      - main

env:
  DOMAIN: tool.ruangprint.co.id
  DOCROOT: /var/www/tool.ruangprint.co.id

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload file HTML ke folder sementara di VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "*.html"
          target: /tmp/ruangprint-deploy
          rm: true

      - name: Setup Nginx, deploy file & reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOMAIN,DOCROOT
          script: |
            set -e
            DOMAIN=tool.ruangprint.co.id
            DOCROOT=/var/www/tool.ruangprint.co.id

            # Install Nginx kalau belum ada
            if ! command -v nginx >/dev/null 2>&1; then
              echo "Nginx belum ada, menginstall..."
              sudo apt-get update -y
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nginx
            fi

            # Siapkan document root
            sudo mkdir -p "$DOCROOT"
            sudo cp -f /tmp/ruangprint-deploy/*.html "$DOCROOT"/
            sudo chown -R www-data:www-data "$DOCROOT"
            sudo find "$DOCROOT" -type f -exec chmod 644 {} \;
            sudo chmod 755 "$DOCROOT"
            rm -rf /tmp/ruangprint-deploy

            # Buat virtual host (sekaligus default_server agar akses via IP juga tampil)
            CONF=/etc/nginx/sites-available/$DOMAIN
            sudo tee "$CONF" > /dev/null <<NGINX
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name $DOMAIN;

                root $DOCROOT;
                index index.html;

                location / {
                    try_files \$uri \$uri/ =404;
                }
            }
            NGINX
            sudo ln -sf "$CONF" /etc/nginx/sites-enabled/$DOMAIN

            # Matikan halaman bawaan Nginx supaya tidak bentrok default_server
            sudo rm -f /etc/nginx/sites-enabled/default

            # Test config & reload
            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deploy selesai. Isi $DOCROOT:"
            ls -la "$DOCROOT"
