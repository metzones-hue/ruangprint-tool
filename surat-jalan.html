<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@500;700&display=swap');
:root{--gold:#F5A800;--dark:#18181B;--surf-el:#1B1B20;--bg:#0A0A0B;--bg2:#131316;--border:rgba(255,255,255,.09);--muted:#A1A1AA;--text:#FAFAFA;--panel:#131316;--green:#22C55E;--red:#F87171}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg)}
.app{display:grid;grid-template-columns:430px 1fr;height:100vh;overflow:hidden}
@media(max-width:980px){.app{grid-template-columns:1fr;height:auto;overflow:visible}}

/* LEFT */
.left{display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);overflow:hidden}
.brand-bar{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;backdrop-filter:blur(20px)}
.brand-bar img{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0}
.brand-bar h1{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;letter-spacing:.04em}
.brand-bar em{font-size:10px;color:var(--muted);font-style:normal}
.nav-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-actions a,.nav-actions button{font-size:12px;padding:8px 12px;border-radius:8px;font-weight:600;background:var(--surf-el);border:1px solid var(--border);color:var(--text);text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;line-height:1}
.nav-actions a:hover,.nav-actions button:hover{border-color:var(--gold)}
.nav-actions a#adminLink{background:rgba(245,168,0,.14);border-color:rgba(245,168,0,.3);color:var(--gold)}
.cs-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--panel)}
.cs-label{font-size:11px;font-weight:600;color:var(--muted)}
.cs-field{background:var(--surf-el);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12.5px;color:var(--text);font-family:inherit;min-height:36px}
.lscroll{flex:1;overflow-y:auto;padding:14px 16px 30px}
.lscroll::-webkit-scrollbar{width:4px}.lscroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.st{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.st::after{content:'';flex:1;height:1px;background:var(--border)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fc{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.fc.full{grid-column:1/-1}
label{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:var(--surf-el)}
input:-webkit-autofill{-webkit-text-fill-color:var(--text)!important;-webkit-box-shadow:0 0 0 1000px var(--surf-el) inset!important}
textarea{resize:vertical;min-height:48px;line-height:1.5}
input[readonly]{color:var(--muted);background:var(--surf-el)}

/* ITEM ROWS */
.it-card{background:var(--surf-el);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
.it-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.it-no{font-size:11px;font-weight:700;color:var(--gold)}
.it-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:5px;width:auto}
.it-del:hover{background:rgba(248,113,113,.12)}
.it-grid{display:grid;grid-template-columns:1fr 70px 70px;gap:6px}
.badd{margin-top:4px;padding:10px;width:100%;background:rgba(245,168,0,.12);color:var(--gold);border:1px dashed var(--gold);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
.badd:hover{background:rgba(245,168,0,.2)}

.toggle-row{display:flex;align-items:center;gap:8px;padding:10px 11px;background:var(--surf-el);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.toggle-row input{width:auto;accent-color:var(--gold)}
.toggle-row label{text-transform:none;font-size:12.5px;font-weight:500;color:var(--text);letter-spacing:0}

/* RIGHT */
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
.rtbar{padding:12px 16px;background:var(--dark);display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.btn-print{padding:11px 18px;background:var(--gold);color:#18181B;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;width:auto}
.btn-print:hover{background:#FFC04D}
.btool{padding:10px 14px;background:rgba(255,255,255,.08);color:#ddd;border:1px solid #3a3a3a;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;width:auto}
.btool:hover{background:rgba(255,255,255,.14);border-color:#555}
.btool.baru{color:var(--gold);border-color:rgba(245,168,0,.4)}
.thint{font-size:10px;color:var(--muted);margin-left:auto;white-space:nowrap}
.rscroll{flex:1;overflow-y:auto;padding:22px;display:flex;justify-content:center}
.rscroll::-webkit-scrollbar{width:5px}.rscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}

/* HISTORY */
.hpanel{display:none;background:#0d0d0e;border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0;flex-direction:column;gap:8px}
.hpanel.show{display:flex}
.hpanel-title{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.06em}
.hlist{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.hitem{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:6px;border:1px solid var(--border)}
.hitem:hover{background:rgba(255,255,255,.08)}
.hno{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;color:var(--gold);min-width:120px}
.hcust{font-size:11px;color:#bbb;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdate{font-size:10px;color:var(--muted);white-space:nowrap}
.hbtn{padding:4px 9px;background:none;border:1px solid #3a3a3a;border-radius:5px;cursor:pointer;font-size:10px;color:#999;width:auto}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.hbtn.hdel:hover{border-color:var(--red);color:var(--red)}
.hempty{font-size:11px;color:var(--muted);text-align:center;padding:12px}

/* PAPER (PDF) */
.paper{width:210mm;min-height:148mm;background:#fff;color:#1a1a1a;padding:10mm 12mm;font-size:11px;font-family:'DM Sans',Arial,sans-serif;box-shadow:0 8px 40px rgba(0,0,0,.4);border-radius:2px}
.p-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid var(--gold);padding-bottom:12px;margin-bottom:16px}
.p-brand{display:flex;gap:12px;align-items:center}
.p-brand img{width:54px;height:54px;border-radius:50%;object-fit:cover}
.p-co{font-weight:800;font-size:14px;color:#18181B}
.p-co-sub{font-size:8.5px;color:#666;line-height:1.7;margin-top:2px}
.p-title{text-align:right}
.p-title h2{font-family:'Outfit',sans-serif;font-size:20px;letter-spacing:1px;color:#18181B;text-transform:uppercase}
.p-title .no{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);font-weight:700;margin-top:3px}
.p-title .dt{font-size:9px;color:#666;margin-top:2px}
.p-to{display:flex;justify-content:space-between;gap:24px;margin-bottom:16px}
.p-to-blk{font-size:10px;line-height:1.6;flex:1}
.p-to-blk b{display:block;font-size:8px;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.p-to-blk .nm{font-weight:700;color:#18181B;font-size:11px}
.p-tbl{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:14px}
.p-tbl thead tr{background:#18181B}
.p-tbl th{color:#fff;padding:7px 8px;font-size:8.5px;text-transform:uppercase;letter-spacing:.4px;text-align:left;font-family:'Outfit',sans-serif}
.p-tbl th.r,.p-tbl td.r{text-align:right}
.p-tbl th.c,.p-tbl td.c{text-align:center}
.p-tbl td{padding:7px 8px;border-bottom:1px solid #eee;vertical-align:top}
.p-tbl .sp{font-size:8.5px;color:#888;margin-top:1px}
.p-tbl tr.tot td{font-weight:800;background:var(--gold);color:#18181B;border:none}
.p-note{background:#FFFBEE;border:1px solid #E8D860;border-radius:5px;padding:8px 10px;font-size:9.5px;margin-bottom:12px;color:#5a4a00}
.p-ship{display:flex;gap:18px;font-size:10px;margin-bottom:8px;color:#444}
.p-ship b{color:#18181B}
.p-sign{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:26px}
.p-sbox{text-align:center;font-size:9px;color:#666}
.p-sline{border-top:1px solid #999;margin:42px 12px 4px;padding-top:4px;color:#18181B;font-weight:700}
.p-foot{text-align:center;font-size:8px;color:#aaa;margin-top:16px;border-top:1px solid #eee;padding-top:6px}

@media print{
  body *{visibility:hidden}
  .rscroll,.rscroll *{visibility:visible}
  .rscroll{position:absolute;left:0;top:0;padding:0;display:block}
  .paper{box-shadow:none;border-radius:0;width:100%;min-height:auto;padding:8mm 10mm}
  @page{size:A5 landscape;margin:0}
}
#toast{position:fixed;bottom:22px;right:22px;background:var(--dark);color:#fff;padding:11px 18px;border-radius:8px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;border-left:3px solid var(--gold);z-index:9999}
#toast.show{opacity:1}
.lupload{border:1.5px dashed var(--border);border-radius:8px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:var(--surf-el)}
.lupload:hover{border-color:var(--gold)}
.lupload img{max-height:46px;max-width:160px;border-radius:6px;object-fit:contain;background:#fff;padding:3px}
.it-row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
</style>
</head>

<div class="app">
  <!-- LEFT: FORM -->
  <div class="left">
    <div class="brand-bar">
      <img id="brandLogo" alt="ruangprint">
      <div style="display:flex;flex-direction:column;line-height:1.15">
        <h1>RUANGPRINT</h1>
        <em>SURAT JALAN</em>
      </div>
    </div>
    <div class="cs-bar">
      <span class="cs-label">Cabang:</span>
      <select id="cs_cabang" class="cs-field" onchange="savePref();render()">
        <option value="HO">Head Office</option>
        <option value="DMB">Daan Mogot</option>
        <option value="CTR">Citra Raya</option>
        <option value="GDS">Gading Serpong</option>
        <option value="CGK">Cengkareng</option>
        <option value="BKS">Bekasi</option>
      </select>
      <span class="cs-label">Petugas:</span>
      <input id="cs_name" class="cs-field" type="text" placeholder="Nama kamu..." style="width:130px" onchange="savePref();render()">
    </div>

    <div class="lscroll">
      <div class="st">Perusahaan &amp; Logo</div>
      <div class="fc"><label>Logo (opsional)</label>
        <div class="lupload" onclick="document.getElementById('logoFile').click()">
          <img id="logoPrev" alt="logo">
          <span style="font-size:10px;color:var(--muted)">Klik untuk ganti logo · <a onclick="event.stopPropagation();resetLogo()" style="color:var(--gold);cursor:pointer">reset ke default</a></span>
          <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="onLogo(event)">
        </div>
      </div>
      <div class="fc"><label>Nama Perusahaan</label><input id="comp_name" placeholder="Ruangprint (cabang)" oninput="render()"></div>
      <div class="fr">
        <div class="fc"><label>Telepon</label><input id="comp_phone" value="0812 8816 1119" oninput="render()"></div>
        <div class="fc"><label>Alamat</label><input id="comp_addr" value="Jl. Gilimanuk No 60 Kalideres, Jakarta Barat" oninput="render()"></div>
      </div>
      <div class="st">Nomor &amp; Tanggal</div>
      <div class="fr">
        <div class="fc"><label>No. Urut</label><input type="number" id="f_seq" value="1" oninput="genNo();render()"></div>
        <div class="fc"><label>Tanggal Kirim</label><input type="date" id="f_date" oninput="genNo();render()"></div>
        <div class="fc full"><label>No. Surat Jalan</label><input id="f_no" readonly></div>
        <div class="fc full"><label>Ref. No. Quotation / PO <span style="text-transform:none;color:var(--muted)">(opsional)</span></label><input id="f_ref" placeholder="mis. P-2026-0143" oninput="render()"></div>
      </div>

      <div class="st">Tujuan Pengiriman</div>
      <div class="fc"><label>Nama Customer / PT</label><input id="f_cust" placeholder="PT ..." oninput="render()"></div>
      <div class="fr">
        <div class="fc"><label>PIC Penerima</label><input id="f_pic" placeholder="Bpk/Ibu..." oninput="render()"></div>
        <div class="fc"><label>Telepon</label><input id="f_telp" placeholder="08..." oninput="render()"></div>
      </div>
      <div class="fc"><label>Alamat Pengiriman</label><textarea id="f_alamat" rows="2" placeholder="Alamat lengkap tujuan..." oninput="render()"></textarea></div>

      <div class="st">Barang Dikirim</div>
      <div class="toggle-row">
        <input type="checkbox" id="f_showharga" onchange="renderItems();render()">
        <label for="f_showharga">Tampilkan harga &amp; total di surat jalan</label>
      </div>
      <div id="itemList"></div>
      <button class="badd" onclick="addItem()">+ Tambah Barang</button>

      <div class="st">Pengiriman</div>
      <div class="fr">
        <div class="fc"><label>Ekspedisi / Armada</label><input id="f_eksp" placeholder="mis. Mobil sendiri" oninput="render()"></div>
        <div class="fc"><label>Nama Driver</label><input id="f_driver" placeholder="Nama supir" oninput="render()"></div>
      </div>
      <div class="fc"><label>No. Polisi</label><input id="f_nopol" placeholder="B 1234 XX" oninput="render()"></div>

      <div class="st">Catatan</div>
      <div class="fc"><textarea id="f_note" rows="2" placeholder="Catatan tambahan (opsional)..." oninput="render()"></textarea></div>

      <div class="st">Tanda Tangan</div>
      <div class="fr">
        <div class="fc"><label>Penerima (nama)</label><input id="f_ttd_terima" placeholder="Nama penerima" oninput="render()"></div>
        <div class="fc"><label>Hormat kami (nama)</label><input id="f_ttd_kirim" placeholder="Petugas pengirim" oninput="render()"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: PREVIEW -->
  <div class="right">
    <div class="rtbar">
      <button class="btn-print" onclick="window.print()">🖨 Print / PDF</button>
      <button class="btool" onclick="saveDoc()">💾 Simpan</button>
      <button class="btool" id="btnHist" onclick="toggleHistory()">🕘 Riwayat</button>
      <button class="btool baru" onclick="newDoc()">✦ Baru</button>
      <div class="nav-actions">
        <a href="index.html">← Beranda</a>
        <a id="adminLink" href="admin.html" style="display:none">⚙ Admin</a>
        <button onclick="doLogout()">⇥ Keluar</button>
      </div>
    </div>
    <div class="hpanel" id="hpanel">
      <div class="hpanel-title">Riwayat Surat Jalan</div>
      <div class="hlist" id="hlist"><div class="hempty">Memuat…</div></div>
    </div>
    <div class="rscroll">
      <div class="paper" id="paper"></div>
    </div>
  </div>
</div>

let _tok=localStorage.getItem('rp_auth_token')||'';
let items=[];
let _editId=null;
let customLogo=null;

document.getElementById('brandLogo').src=LOGO;
function onLogo(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{customLogo=e.target.result;document.getElementById('logoPrev').src=customLogo;render();};r.readAsDataURL(f);}
function resetLogo(){customLogo=null;document.getElementById('logoPrev').src=LOGO;render();}

async function api(method,path,body){
  const o={method,headers:{'Content-Type':'application/json'}};
  if(_tok)o.headers['Authorization']='Bearer '+_tok;
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(API+path,o);
  let d=null;try{d=await r.json();}catch(e){}
  return{ok:r.ok,status:r.status,data:d};
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function rp(n){return 'Rp '+(Number(n)||0).toLocaleString('id-ID');}
function doLogout(){localStorage.removeItem('rp_auth_token');location.href='index.html';}
function savePref(){localStorage.setItem('rp_cabang',document.getElementById('cs_cabang').value);localStorage.setItem('rp_csname',document.getElementById('cs_name').value);}

function genNo(){
  const cab=document.getElementById('cs_cabang').value||'HO';
  const ds=document.getElementById('f_date').value;
  const dt=ds?new Date(ds+'T00:00:00'):new Date();
  const dd=String(dt.getDate()).padStart(2,'0'),mm=String(dt.getMonth()+1).padStart(2,'0'),yy=String(dt.getFullYear()).slice(-2);
  const seq=String(Math.max(1,parseInt(document.getElementById('f_seq').value)||1)).padStart(3,'0');
  document.getElementById('f_no').value='SJ/'+cab+'/'+seq+'/'+dd+mm+yy;
}

/* ITEMS */
function addItem(it){items.push(it||{nama:'',spec:'',qty:1,satuan:'pcs',harga:0,ket:''});renderItems();render();}
function delItem(i){items.splice(i,1);renderItems();render();}
function updItem(i,k,v){items[i][k]=v;render();}
function renderItems(){
  const showH=document.getElementById('f_showharga').checked;
  document.getElementById('itemList').innerHTML=items.map((it,i)=>`
    <div class="it-card">
      <div class="it-head"><span class="it-no">Barang ${i+1}</span><button class="it-del" onclick="delItem(${i})">🗑</button></div>
      <div class="fc"><input placeholder="Nama barang/produk" value="${esc(it.nama)}" oninput="updItem(${i},'nama',this.value)"></div>
      <div class="fc"><input placeholder="Spesifikasi (mis. A4, AP150, 4/4)" value="${esc(it.spec)}" oninput="updItem(${i},'spec',this.value)"></div>
      <div class="it-row2">
        <input type="number" placeholder="Qty" value="${esc(it.qty)}" oninput="updItem(${i},'qty',this.value)">
        <input placeholder="Satuan" value="${esc(it.satuan)}" oninput="updItem(${i},'satuan',this.value)">
      </div>
      <div class="fc"><input placeholder="Keterangan (mis. jumlah koli, kondisi)" value="${esc(it.ket)}" oninput="updItem(${i},'ket',this.value)"></div>
      ${showH?`<div class="fc"><input type="number" placeholder="Harga satuan (Rp)" value="${esc(it.harga)}" oninput="updItem(${i},'harga',this.value)"></div>`:''}
    </div>`).join('') || '<div style="font-size:11px;color:var(--muted);padding:6px 0">Belum ada barang. Klik "Tambah Barang".</div>';
}

/* PREVIEW */
function render(){
  const g=id=>document.getElementById(id).value;
  const showH=document.getElementById('f_showharga').checked;
  const dt=g('f_date')?new Date(g('f_date')+'T00:00:00'):new Date();
  const tgl=dt.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  const cab=g('cs_cabang'), cabTxt=document.querySelector('#cs_cabang option:checked').textContent;
  const lg=customLogo||LOGO;
  const compName=g('comp_name')||('Ruangprint '+cabTxt);
  let total=0;
  const rows=items.map((it,i)=>{
    const sub=(Number(it.qty)||0)*(Number(it.harga)||0); total+=sub;
    const ketUnder=(showH && it.ket)?`<div class="sp">Ket: ${esc(it.ket)}</div>`:'';
    return `<tr>
      <td class="c">${i+1}</td>
      <td><b>${esc(it.nama)||'-'}</b>${it.spec?`<div class="sp">${esc(it.spec)}</div>`:''}${ketUnder}</td>
      <td class="c">${esc(it.qty)||0} ${esc(it.satuan)||''}</td>
      ${showH?`<td class="r">${rp(it.harga)}</td><td class="r">${rp(sub)}</td>`:`<td>${esc(it.ket)||''}</td>`}
    </tr>`;}).join('') || `<tr><td colspan="${showH?5:4}" style="text-align:center;color:#999;padding:14px">Belum ada barang</td></tr>`;
  const totRow=showH?`<tr class="tot"><td colspan="4" class="r">TOTAL</td><td class="r">${rp(total)}</td></tr>`:'';
  const head=showH
    ? `<th class="c" style="width:24px">#</th><th>Barang</th><th class="c" style="width:70px">Qty</th><th class="r" style="width:80px">Harga</th><th class="r" style="width:90px">Total</th>`
    : `<th class="c" style="width:24px">#</th><th>Barang</th><th class="c" style="width:80px">Qty</th><th style="width:130px">Keterangan</th>`;

  document.getElementById('paper').innerHTML=`
    <div class="p-head">
      <div class="p-brand"><img src="${lg}"><div>
        <div class="p-co">${esc(compName)}</div>
        <div class="p-co-sub">${esc(g('comp_addr')).replace(/\n/g,'<br>')}${g('comp_phone')?'<br>'+esc(g('comp_phone')):''}</div>
      </div></div>
      <div class="p-title"><h2>Surat Jalan</h2>
        <div class="no">${esc(g('f_no'))}</div>
        <div class="dt">${tgl}</div>
        ${g('f_ref')?`<div class="dt">Ref: ${esc(g('f_ref'))}</div>`:''}
      </div>
    </div>
    <div class="p-to">
      <div class="p-to-blk"><b>Dikirim Kepada</b>
        <div class="nm">${esc(g('f_cust'))||'-'}</div>
        ${g('f_pic')?`<div>u.p. ${esc(g('f_pic'))}</div>`:''}
        ${g('f_alamat')?`<div>${esc(g('f_alamat')).replace(/\n/g,'<br>')}</div>`:''}
        ${g('f_telp')?`<div>${esc(g('f_telp'))}</div>`:''}
      </div>
      <div class="p-to-blk" style="text-align:right"><b>Pengirim</b>
        <div class="nm">${esc(compName)}</div>
        ${g('cs_name')?`<div>Petugas: ${esc(g('cs_name'))}</div>`:''}
      </div>
    </div>
    <table class="p-tbl"><thead><tr>${head}</tr></thead><tbody>${rows}${totRow}</tbody></table>
    ${g('f_note')?`<div class="p-note">${esc(g('f_note')).replace(/\n/g,'<br>')}</div>`:''}
    <div class="p-ship">
      ${g('f_eksp')?`<div>Ekspedisi: <b>${esc(g('f_eksp'))}</b></div>`:''}
      ${g('f_driver')?`<div>Driver: <b>${esc(g('f_driver'))}</b></div>`:''}
      ${g('f_nopol')?`<div>No. Pol: <b>${esc(g('f_nopol'))}</b></div>`:''}
    </div>
    <div class="p-sign">
      <div class="p-sbox">Penerima<div class="p-sline">${esc(g('f_ttd_terima'))||'(..................)'}</div></div>
      <div class="p-sbox">Pengirim / Driver<div class="p-sline">${esc(g('f_driver'))||'(..................)'}</div></div>
      <div class="p-sbox">Hormat kami<div class="p-sline">${esc(g('f_ttd_kirim'))||esc(g('cs_name'))||'(..................)'}</div></div>
    </div>
    <div class="p-foot">Dokumen ini sah sebagai bukti pengiriman barang. Barang diperiksa &amp; diterima dalam keadaan baik.</div>`;
}

/* SAVE / HISTORY */
function collect(){
  const g=id=>document.getElementById(id).value;
  return {no_sj:g('f_no'),tanggal:g('f_date'),ref_quotation:g('f_ref'),
    cust:{nama:g('f_cust'),pic:g('f_pic'),telp:g('f_telp'),alamat:g('f_alamat')},
    showHarga:document.getElementById('f_showharga').checked,
    comp:{name:g('comp_name'),phone:g('comp_phone'),addr:g('comp_addr')}, logo:customLogo,
    seq:g('f_seq'),items,
    kirim:{eksp:g('f_eksp'),driver:g('f_driver'),nopol:g('f_nopol')},
    note:g('f_note'),ttd:{terima:g('f_ttd_terima'),kirim:g('f_ttd_kirim')}};
}
async function saveDoc(){
  const g=id=>document.getElementById(id).value;
  if(!g('f_cust')){toast('Isi nama customer dulu.');return;}
  if(!items.length){toast('Tambah minimal 1 barang.');return;}
  const id=_editId||Date.now();
  const r=await api('POST','/delivery-notes',{
    id,no_sj:g('f_no'),cabang:g('cs_cabang'),cs_name:g('cs_name'),
    customer:g('f_cust'),tanggal:g('f_date'),ref_quotation:g('f_ref'),
    data_json:JSON.stringify(collect())});
  if(!r.ok){toast((r.data&&r.data.error)||'Gagal menyimpan.');return;}
  _editId=id;toast('✓ Surat jalan tersimpan.');
}
function toggleHistory(){const p=document.getElementById('hpanel');p.classList.toggle('show');if(p.classList.contains('show'))loadHistory();}
async function loadHistory(){
  const r=await api('GET','/delivery-notes');
  const el=document.getElementById('hlist');
  if(!r.ok){el.innerHTML='<div class="hempty">Gagal memuat.</div>';return;}
  if(!r.data.length){el.innerHTML='<div class="hempty">Belum ada surat jalan tersimpan.</div>';return;}
  el.innerHTML=r.data.map(x=>`<div class="hitem">
    <span class="hno">${esc(x.no_sj||'-')}</span>
    <span class="hcust">${esc(x.customer||'-')}</span>
    <span class="hdate">${esc((x.tanggal||x.created_at||'').slice(0,10))}</span>
    <button class="hbtn" onclick="openDoc(${x.id})">Buka</button>
    <button class="hbtn hdel" onclick="delDoc(${x.id})">Hapus</button>
  </div>`).join('');
}
async function openDoc(id){
  const r=await api('GET','/delivery-notes/'+id+'/data');
  if(!r.ok){toast('Gagal membuka.');return;}
  applyData(JSON.parse(r.data.data_json),id);
  document.getElementById('hpanel').classList.remove('show');
  toast('Surat jalan dimuat.');
}
async function delDoc(id){
  if(!confirm('Hapus surat jalan ini?'))return;
  const r=await api('DELETE','/delivery-notes/'+id);
  if(r.ok){toast('Dihapus.');loadHistory();if(_editId===id)_editId=null;}
}
function applyData(d,id){
  _editId=id||null;
  const s=(k,v)=>{const e=document.getElementById(k);if(e)e.value=v||'';};
  s('f_seq',d.seq||1);s('f_date',d.tanggal);s('f_ref',d.ref_quotation);
  s('f_cust',d.cust&&d.cust.nama);s('f_pic',d.cust&&d.cust.pic);s('f_telp',d.cust&&d.cust.telp);s('f_alamat',d.cust&&d.cust.alamat);
  document.getElementById('f_showharga').checked=!!d.showHarga;
  s('comp_name',d.comp&&d.comp.name);s('comp_phone',(d.comp&&d.comp.phone)||'0812 8816 1119');s('comp_addr',(d.comp&&d.comp.addr)||'Jl. Gilimanuk No 60 Kalideres, Jakarta Barat');
  customLogo=d.logo||null;document.getElementById('logoPrev').src=customLogo||LOGO;
  s('f_eksp',d.kirim&&d.kirim.eksp);s('f_driver',d.kirim&&d.kirim.driver);s('f_nopol',d.kirim&&d.kirim.nopol);
  s('f_note',d.note);s('f_ttd_terima',d.ttd&&d.ttd.terima);s('f_ttd_kirim',d.ttd&&d.ttd.kirim);
  items=Array.isArray(d.items)?d.items:[];
  genNo();renderItems();render();
}
function newDoc(){
  if(!confirm('Buat surat jalan baru? Data yang belum disimpan akan hilang.'))return;
  _editId=null;
  ['f_ref','f_cust','f_pic','f_telp','f_alamat','f_eksp','f_driver','f_nopol','f_note','f_ttd_terima','f_ttd_kirim'].forEach(k=>document.getElementById(k).value='');
  document.getElementById('f_showharga').checked=false;
  document.getElementById('f_seq').value=(parseInt(document.getElementById('f_seq').value)||0)+1;
  items=[];addItem();genNo();renderItems();render();toast('Surat jalan baru.');
}

/* INIT */
async function init(){
  const r=await api('GET','/auth/me');
  if(!r.ok){localStorage.removeItem('rp_auth_token');location.href='index.html';return;}
  const u=r.data;
  document.getElementById('f_date').value=new Date().toISOString().slice(0,10);
  document.getElementById('logoPrev').src=LOGO;
  // cabang / petugas defaults
  const savedCab=localStorage.getItem('rp_cabang'), savedCs=localStorage.getItem('rp_csname');
  if(u.role==='superadmin'){document.getElementById('adminLink').style.display='inline-flex';}
  else{document.getElementById('cs_cabang').value=u.cabang||'HO';document.getElementById('cs_cabang').disabled=true;}
  if(savedCab&&u.role==='superadmin')document.getElementById('cs_cabang').value=savedCab;
  document.getElementById('cs_name').value=savedCs||u.name||'';

  // handoff dari quotation?
  let handled=false;
  try{
    const raw=localStorage.getItem('rp_sj_handoff');
    if(raw){const h=JSON.parse(raw);localStorage.removeItem('rp_sj_handoff');
      document.getElementById('f_cust').value=h.customer||'';
      document.getElementById('f_pic').value=h.pic||'';
      document.getElementById('f_telp').value=h.telp||'';
      document.getElementById('f_alamat').value=h.alamat||'';
      document.getElementById('f_ref').value=h.ref||'';
      items=(h.items||[]).map(it=>({nama:it.nama||'',spec:it.spec||'',qty:it.qty||1,satuan:it.satuan||'pcs',harga:it.harga||0,ket:''}));
      handled=true;toast('Data dari quotation dimuat.');
    }
  }catch(e){}
  if(!handled && !items.length) items=[{nama:'',spec:'',qty:1,satuan:'pcs',harga:0,ket:''}];
  genNo();renderItems();render();
}
init();
</script>
